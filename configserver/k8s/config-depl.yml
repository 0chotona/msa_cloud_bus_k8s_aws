apiVersion: apps/v1

# 자원의 종류(Pod, Service, ReplicaSet, Deployment)
kind: Deployment

metadata:
  name: config-deployment
  namespace: lgcns

spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-pod

  template:
    metadata:
      labels:
        app: config-pod
    spec:
      # docker container 
      containers:
        - name: config-container
        # 혹, 실행중인 컨테이너를 이미지로 만들고 ecr 배포할 경우 ecr repo 주소사용 가능
          image: config 
          ports:
          - containerPort: 8888
---
# core service setting
# core group : pod, service, ConfigMap, Secret, namespace
apiVersion: v1
kind: Service
metadata:
  name: config-service
  namespace: lgcns
spec:
  type: ClusterIP
  ports:
  - port: 8888
    targetPort: 8888
  selector:
    app: config-pod