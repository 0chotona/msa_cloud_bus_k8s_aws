# git repo (spring_cloud_configs.git) 설정 변경이 되었을 때 configserver 비동기 이벤트 발행(RabbitMQ)
# configserver (cloud bus 이벤트 발행자) : rabbitMQ 설정
# 각 micro service (cloud bus 이벤트 소비자) : rabbitMQ 설정
# 메시지 발행 (Producer) -> 라우팅 -> 메시지 저장(Queue) -> 메시지 소비(Consumer)
# 발행자는 직접적으로 메시지큐를 몰라서 Exchange 로만 메시지를 보내고 이를 라우팅이 저장
# RabbitMQ - docker 설치
# docker run -d --name rabbitmq-container -p 5672:5672 rabbitmq:3-management
# http://localhost:5672
spring:
    application:
        name: config-server

    rabbitmq:
        host: rabbitmq
        port: 5672
        username: guest
        password: guest

    cloud:
        config:
            server:
                git:
                    uri: https://github.com/0chotona/spring_cloud_configs.git
                    # config server 기동시 git repo를 미리 clone
                    clone-on-start: true
                    # branch 지정
                    # repo -> private 일 경우
                    # username : github 계정
                    # password: token
                    default-label: main
        # msa 전체에 이벤트를 전파하는 메시지 버스
        # /busrefresh 호출시: RabbitMQ 이벤트 발생이 되고 모든 서비스가 동시에 설정을 갱신
        bus:
            enabled: true

management:
  endpoints:
    web:
      exposure:
        include: busrefresh, health