name: msa dks infra deploy

on:
  # GitHub Actions 화면에서 수동 실행
  workflow_dispatch:


jobs:
  # job name
  deploy-infra:
    # runner
    runs-on: ubuntu-latest
    # https://docs.github.com/ko/actions
    steps:
        # rabbitmq Controller 적용
      - name: deploy rabbitmq
        run: |
          kubectl apply -f ./k8s/msa-rabbitmq.yml


        # Ingress Controller 적용
      - name: deploy ingress
        run: |
          kubectl apply -f ./k8s/msa-ingress.yml

      # Zookeeper 배포
      - name: deploy zookeeper
        run: |
          kubectl apply -f ./k8s/msa-zookeeper.yml

      # Kafka 배포
      - name: deploy kafka
        run: |
          kubectl apply -f ./k8s/msa-kafka.yml

      # Redis 배포
      - name: deploy redis
        run: |
          kubectl apply -f ./k8s/msa-redis.yml

      # 배포 확인
      - name: check pods
        run: |
          kubectl get pods -n lgcns

      - name: check services
        run: |
          kubectl get svc -n lgcns
