apiVersion: apps/v1

# 자원의 종류(Pod, Service, ReplicaSet, Deployment)
kind: Deployment

metadata:
  name: rabbitmq-deployment
  namespace: lgcns

spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq

  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      # docker container 
      containers:
        - name: rabbitmq-container
        # 혹, 실행중인 컨테이너를 이미지로 만들고 ecr 배포할 경우 ecr repo 주소사용 가능
          image: wurstmeister/rabbitmq # nginx:1.21.6 -> nginx:1.21.1
          ports:
          - containerPort: 5672
---
# core service setting
# core group : pod, service, ConfigMap, Secret, namespace
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-service
  namespace: lgcns
spec:
  type: ClusterIP
  ports:
  - port: 2181
    targetPort: 2181
  selector:
    app: rabbitmq